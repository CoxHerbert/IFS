name: "IFS"
mode: "dev" #dev 开发模式，日志打印到控制台，prod  生产模式，日志不打印控制台
port: 8080
version: "v1.1.2"
start_time: "2021-10-01"
machine_id: 1
profile: "/Volumes/disk01/uploadPath"
log:
  level: "info"
  filename: "/Volumes/disk01/baizelog/baizelog.log"
  max_size: 200
  max_age: 30
  max_backups: 7
datasource:
  master:
    driver_name: "mysql"
    host: "118.178.56.162"
    user: "coxherbert"
    password: "qpalzm10."
    dbname: "ifs_db"
    port: 3306
    max_open_conns: 200
    max_idle_conns: 50
  slave:
    count: 0
    driver_name: "mysql"
    hosts: "118.178.56.162"
    users: "coxherbert"
    passwords: "qpalzm10."
    dbnames: "ifs_db"
    ports: 3306,3306
    max_open_connss: 200,200
    max_idle_connss: 50,50

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 1
  pool_size: 100
token:
  expireTime: 30
  secret: abcdefghijklmnopqrstuvwxyz
  issuer: baize

agent:
  ollama:
    base_url: "http://localhost:11434"
    default_model: "qwen2.5:7b"
    timeout: 90
    models:
      - label: "Qwen 2.5 7B"
        value: "qwen2.5:7b"
        description: "默认模型，适合日常货运问答和出货分析。"
        default: true
      - label: "Qwen 2.5 14B"
        value: "qwen2.5:14b"
        description: "更强的推理模型，适合复杂方案分析。"
      - label: "Llama 3.1 8B"
        value: "llama3.1:8b"
        description: "通用对话模型，可作为备选。"
      - label: "DeepSeek R1 8B"
        value: "deepseek-r1:8b"
        description: "偏推理场景，可用于复杂计算说明。"
